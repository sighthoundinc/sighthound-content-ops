#:schema node_modules/wrangler/config-schema.json

name = "accept-markdown"
main = "src/index.js"
compatibility_date = "2025-01-01"

# Routes bind the Worker to each domain. Comment a route out if a domain is not
# yet on Cloudflare (needs nameserver cutover first).

# ── www.sighthound.com ────────────────────────────────────────────
[[routes]]
pattern = "www.sighthound.com/*"
zone_name = "sighthound.com"

# ── www.redactor.com ───────────────────────────────────────────────────────────────
# Confirmed Cloudflare-fronted (cf-ray header present) 2026-04-23.
[[routes]]
pattern = "www.redactor.com/*"
zone_name = "redactor.com"

# ── docs.redactor.com ──────────────────────────────────────────────
# MkDocs Material docs site, Cloudflare-fronted (cf-ray header present) 2026-04-23.
# Worker serves /llms.txt, /llms-full.txt, /robots.txt and Accept-Markdown
# negotiation on every other path.
[[routes]]
pattern = "docs.redactor.com/*"
zone_name = "redactor.com"

# ── dev.sighthound.com ────────────────────────────────────────────
# MkDocs Material developer portal (Redactor API, Vehicle Analytics,
# SIO). Currently served by AmazonS3 / CloudFront — NOT yet on
# Cloudflare. Content files under src/content/dev.sighthound.com/ are
# bundled and ready; uncomment this route the moment DNS is flipped
# to Cloudflare-proxied. Zone is "sighthound.com".
# [[routes]]
# pattern = "dev.sighthound.com/*"
# zone_name = "sighthound.com"

# Observability
[observability]
enabled = true

# Import content files (llms.txt, llms-full.txt, robots.txt) as raw strings
# so the Worker can serve them per hostname without external storage.
[[rules]]
type = "Text"
globs = ["**/*.txt"]
fallthrough = true

# Uncomment to pin Node compat behavior if the converter library is swapped in
# compatibility_flags = ["nodejs_compat"]
