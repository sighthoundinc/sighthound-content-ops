<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Sighthound — Marketing UI Kit (print)</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  @page { size: 1280px 900px; margin: 0; }
  @media print {
    html, body { width: 1280px; }
    section, footer, nav { break-inside: avoid; }
    section { page-break-inside: avoid; }
    nav { position: static !important; }
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="Nav.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="Capabilities.jsx"></script>
<script type="text/babel" src="Marquee.jsx"></script>
<script type="text/babel" src="CustomerLogos.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>
<script type="text/babel" data-presets="env,react">
  function App() {
    return (
      <div data-screen-label="sighthound-home">
        <Nav />
        <Hero />
        <Capabilities />
        <Marquee />
        <CustomerLogos />
        <Footer />
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);

  (async () => {
    if (document.fonts && document.fonts.ready) { try { await document.fonts.ready; } catch(e){} }
    await new Promise(r => setTimeout(r, 1200));
    window.print();
  })();
</script>
</body>
</html>
