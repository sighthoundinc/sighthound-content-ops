<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
<div class="hdr">Form controls</div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;font-family:Lexend">
  <div>
    <label style="font-size:12px;font-weight:500;color:#4b4f73;display:block;margin-bottom:6px">Name*</label>
    <input style="width:100%;padding:10px 14px;border:1px solid #d9dfe6;border-radius:8px;font-family:Lexend;font-size:14px;font-weight:300" placeholder="First and last name">
  </div>
  <div>
    <label style="font-size:12px;font-weight:500;color:#4b4f73;display:block;margin-bottom:6px">Email</label>
    <input style="width:100%;padding:10px 14px;border:2px solid #4f60dc;border-radius:8px;font-family:Lexend;font-size:14px;font-weight:300;box-shadow:0 0 0 3px rgba(79,96,220,.2)" value="maria@sighthound.com">
  </div>
  <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:#1a1d38"><span style="width:18px;height:18px;border-radius:4px;background:#4f60dc;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:11px">✓</span> Keep me signed in</label>
  <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:#1a1d38"><span style="width:18px;height:18px;border-radius:999px;border:2px solid #4f60dc;display:inline-flex;align-items:center;justify-content:center"><span style="width:8px;height:8px;background:#4f60dc;border-radius:999px"></span></span> Selection</label>
</div>
</div></body></html>
